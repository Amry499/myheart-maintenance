<!doctype html>
<html dir="ltr" lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Platform Maintenance – MyHeart Portal</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', Arial, sans-serif;
            height: 100vh;
            overflow: hidden; /* Hide body scroll, kita manage sendiri */
            background-color: #f5f5f5;
            background-image: url('https://myheart.my/wp-content/uploads/2023/03/Background.png');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* Header dengan background putih separa telus */
        .header {
            flex-shrink: 0;
            padding: 15px 30px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 20;
        }
        
        .logo-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }
        
        .logo {
            width: 220px; /* Logo lebih besar sikit */
            height: auto;
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }
        
        /* Main Content - Banner dengan horizontal scroll untuk mobile */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 0;
            position: relative;
            width: 100%;
            overflow-x: auto; /* Enable horizontal scroll */
            overflow-y: hidden; /* No vertical scroll */
            -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
            scrollbar-width: thin; /* Thin scrollbar for Firefox */
            scrollbar-color: #ECD5BB rgba(255, 255, 255, 0.2); /* Custom scrollbar color */
        }
        
        /* Custom scrollbar untuk Chrome/Safari/Edge */
        .main-content::-webkit-scrollbar {
            height: 8px;
        }
        
        .main-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        
        .main-content::-webkit-scrollbar-thumb {
            background: #ECD5BB;
            border-radius: 10px;
        }
        
        .main-content::-webkit-scrollbar-thumb:hover {
            background: #d4b89e;
        }
        
        /* Banner Container - Lebih besar dan boleh scroll horizontal */
        .banner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 100%; /* Default full width */
            padding: 10px 20px;
        }
        
        /* Banner Image - Dibesarkan */
        .notice-banner {
            width: auto;
            height: auto;
            max-width: 95vw; /* Maksimum 95% viewport width */
            max-height: 65vh; /* Kurangkan sikit bagi ruang */
            object-fit: contain;
            border-radius: 24px; /* Lebih besar radius untuk look moden */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }
        
        .notice-banner:hover {
            transform: scale(1.02);
        }
        
        /* Footer */
        .footer {
            flex-shrink: 0;
            text-align: center;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 15px;
            backdrop-filter: blur(3px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 20;
        }
        
        .footer a {
            color: #ECD5BB;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .footer a:hover {
            color: #fff;
            text-decoration: underline;
        }
        
        /* ===== MOBILE STYLES - Horizontal scroll effect ===== */
        @media (max-width: 768px) {
            .header {
                padding: 12px 20px;
            }
            
            .logo {
                width: 180px;
            }
            
            /* Enable horizontal scroll dengan banner besar */
            .main-content {
                justify-content: flex-start; /* Mula dari kiri untuk scroll */
                padding: 0;
                overflow-x: auto;
                scroll-snap-type: x mandatory; /* Snap effect */
            }
            
            .banner-container {
                min-width: 120%; /* Lebih lebar dari screen untuk trigger scroll */
                padding: 15px 30px;
                scroll-snap-align: center; /* Snap ke tengah */
            }
            
            .notice-banner {
                max-width: 115%; /* Banner lebih besar dari screen */
                max-height: 60vh;
                border-radius: 32px;
                box-shadow: 0 40px 70px rgba(0, 0, 0, 0.5);
            }
            
            /* Scroll indicator (optional) */
            .main-content::after {
                content: '← →';
                position: absolute;
                bottom: 10px;
                right: 20px;
                background: rgba(0, 0, 0, 0.5);
                color: white;
                padding: 8px 15px;
                border-radius: 30px;
                font-size: 14px;
                backdrop-filter: blur(5px);
                opacity: 0.7;
                pointer-events: none;
                z-index: 30;
            }
            
            .footer {
                padding: 12px;
                font-size: 14px;
            }
        }
        
        /* Small mobile */
        @media (max-width: 480px) {
            .header {
                padding: 10px 15px;
            }
            
            .logo {
                width: 150px;
            }
            
            .banner-container {
                min-width: 140%; /* Lebih lebar untuk skrin kecil */
                padding: 10px 20px;
            }
            
            .notice-banner {
                max-width: 130%;
                max-height: 55vh;
                border-radius: 28px;
            }
            
            .main-content::after {
                content: '← Swipe →';
                font-size: 12px;
                padding: 6px 12px;
                bottom: 5px;
            }
            
            .footer {
                padding: 10px;
                font-size: 12px;
            }
        }
        
        /* Untuk skrin yang sangat rendah */
        @media (max-height: 600px) {
            .header {
                padding: 8px 15px;
            }
            
            .logo {
                width: 130px;
            }
            
            .notice-banner {
                max-height: 50vh;
            }
            
            .footer {
                padding: 8px;
            }
        }
        
        /* Tablet styles */
        @media (min-width: 769px) and (max-width: 1024px) {
            .notice-banner {
                max-width: 90vw;
                max-height: 70vh;
            }
        }
        
        /* Desktop - banner besar tapi still terkawal */
        @media (min-width: 1025px) {
            .notice-banner {
                max-width: 85vw;
                max-height: 70vh;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-container">
            <img src="https://myheart.my/wp-content/uploads/2023/02/MYHeart-BI.png" 
                 alt="MyHeart Logo" 
                 class="logo">
        </div>
    </div>
    
    <!-- Main Content dengan horizontal scroll untuk mobile -->
    <div class="main-content">
        <div class="banner-container">
            <!-- 
                NOTA: Gantikan src di bawah dengan path sebenar ke fail notice_banner.png
            -->
            <img src="notice_banner.png" 
                 alt="Platform Maintenance Notice" 
                 class="notice-banner">
        </div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
        For further enquiries, please contact <a href="mailto:myheart@talentcorp.com.my">myheart@talentcorp.com.my</a>
    </div>
</body>
</html>
